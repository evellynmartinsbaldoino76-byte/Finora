<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Cadastre-se | Finora</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" /><link rel="stylesheet" href="auth.css" /></head><body><main class="auth-layout"><aside class="auth-aside"><a class="brand" href="login.html">finora<span>.</span></a><h1>Comece a cuidar do seu futuro.</h1><p>Finora é a maneira simples, intuitiva e moderna de acompanhar sua vida financeira.</p><i class="shape one"></i><i class="shape two"></i></aside><section class="auth-form"><p class="eyebrow">COMECE AGORA</p><h2>Crie sua conta na Finora</h2><p class="subtitle">Leva menos de um minuto.</p><form id="register-form" novalidate><label class="field">Nome completo<input type="text" name="name" autocomplete="name" placeholder="Seu nome" required /></label><label class="field">E-mail<input type="email" name="email" autocomplete="email" placeholder="voce@email.com" required /></label><label class="field"><span class="password-row">Senha <button class="toggle-password" data-target="register-password" type="button">Mostrar</button></span><input id="register-password" type="password" name="password" autocomplete="new-password" placeholder="Mínimo de 6 caracteres" required /></label><label class="field">Confirmar senha<input type="password" name="confirmation" autocomplete="new-password" placeholder="Repita sua senha" required /></label><p id="form-error" class="error" aria-live="polite"></p><button class="submit" type="submit">Criar conta →</button></form><p class="switch">Já tem uma conta? <a href="login.html">Entrar</a></p></section></main><script src="auth.js"></script></body></html>
